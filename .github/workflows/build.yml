name: Build & Push Images

on:
  push:
    branches: [main]
  schedule:
    # Run every Sunday at 4 AM UTC to catch dependency updates
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Reclaim runner disk space
        run: |
          df -h
          if command -v sudo >/dev/null 2>&1; then
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          fi
          docker system prune -af || true
          docker builder prune -af || true
          df -h

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image names
        run: |
          REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "APP_IMAGE=ghcr.io/${REPO}" >> $GITHUB_ENV
          echo "ENV_IMAGE=ghcr.io/${REPO}-env" >> $GITHUB_ENV

      - name: Resolve opencode-ai version from plugin package
        run: |
          OPENCODE_VERSION=$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('opencode/package.json', 'utf8')); const version = pkg.dependencies?.['@opencode-ai/plugin']; if (typeof version !== 'string' || version.trim().length === 0) { throw new Error('Missing @opencode-ai/plugin dependency version'); } process.stdout.write(version.replace(/^[^0-9]*/, ''));")
          echo "OPENCODE_VERSION=${OPENCODE_VERSION}" >> $GITHUB_ENV

      - name: Build and push environment image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.env
          push: true
          cache-from: type=gha,scope=env
          cache-to: type=gha,mode=min,scope=env
          build-args: |
            OPENCODE_VERSION=${{ env.OPENCODE_VERSION }}
          tags: |
            ${{ env.ENV_IMAGE }}:latest
            ${{ env.ENV_IMAGE }}:${{ github.sha }}

      - name: Prune Docker data before app image build
        run: |
          docker image prune -af || true
          docker builder prune -af || true

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=min,scope=app
          build-args: |
            BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
