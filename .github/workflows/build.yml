name: Build & Push Images

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image names
        run: |
          REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "APP_IMAGE=ghcr.io/${REPO}" >> $GITHUB_ENV
          echo "ENV_IMAGE=ghcr.io/${REPO}-env" >> $GITHUB_ENV

      - name: Build and push environment image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.env
          push: true
          cache-from: type=gha,scope=env
          cache-to: type=gha,mode=max,scope=env
          tags: |
            ${{ env.ENV_IMAGE }}:latest
            ${{ env.ENV_IMAGE }}:${{ github.sha }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
          build-args: |
            BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
