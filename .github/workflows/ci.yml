name: CI — Type Check

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install glab CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y glab

      - run: npm ci

      - run: npm run check:opencode-assets

      - run: npm run test:opencode-assets

      - run: npm run typecheck
